<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gazetkowo Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: "DM Sans", "Roboto", -apple-system, system-ui, sans-serif;
      --bg: #E8F1FC;
      --surface: #ffffff;
      --surface-soft: #f8f9fd;
      --text: #20232c;
      --text-muted: #5a6478;
      --button: #fed130;
      --button-pressed: #f6c937;
      --border: rgba(16, 24, 40, 0.08);
      --radius: 28px;
      --radius-sm: 16px;
      --shadow: 0 28px 80px rgba(13, 48, 94, 0.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 100vh;
      height: 100dvh;
      padding: 0;
    }

    .page {
      width: 420px;
      flex-shrink: 0;
      background: var(--bg);
      overflow: hidden;
      transform-origin: center bottom;
    }

    .status-bar {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 10;
      width: 100%;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 6px;
      padding: 18px 18px 10px;
      background: var(--bg);
      color: #0f172a;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .status-bar svg {
      display: block;
    }

    .status-bar time {
      margin-left: 4px;
    }

    .screen {
      position: relative;
      background: #E8F1FC;
      height: 692px;
      overflow: hidden;
    }

    .map-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-image: url(/img/onboarding/map.jpg);
      background-size: cover;
      background-position: center;
      mix-blend-mode: screen;
      opacity: 0;
      pointer-events: none;
      transition: opacity 600ms ease;
    }

    .map-bg.is-visible {
      opacity: 1;
    }

    .hero-panel {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 32px 24px 276px;
      text-align: center;
      background: var(--bg);
    }

    .hero-card {
      position: relative;
      z-index: 1;
      max-width: 320px;
      width: 100%;
      margin-top: 22px;
      transition: opacity 280ms ease;
    }

    .hero-card.is-fading {
      opacity: 0;
    }

    .hero-card.is-hidden {
      display: none;
    }

    .speech {
      position: absolute;
      z-index: 2;
      top: -14px;
      left: 50%;
      transform: translateX(calc(-50% + 30px));
      width: min(92%, 200px);
      background: #ffffff;
      border: 1px solid rgba(16,24,40,0.08);
      border-radius: 22px;
      padding: 16px 18px 14px;
      box-shadow: 0 18px 40px rgba(3, 23, 62, 0.08), inset 0 3px 0 0 var(--button);
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.3;
      color: #101828;
      text-align: left;
      opacity: 1;
      transition: opacity 280ms ease;
    }

    .speech::after {
      content: "";
      position: absolute;
      left: 36px;
      bottom: -12px;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-left: 1px solid rgba(16,24,40,0.08);
      border-bottom: 1px solid rgba(16,24,40,0.08);
      transform: rotate(45deg);
      border-radius: 4px 0 0 0;
    }

    .speech.is-fading {
      opacity: 0;
    }

    .speech.is-hidden {
      display: none;
    }

    #speech2 {
      top: 78px;
    }

    .coin {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: radial-gradient(circle at 32% 28%, #ffe89a, #fed130 55%, #f5b93c 100%);
      box-shadow: 0 0 0 6px rgba(254, 209, 48, 0.18), 0 6px 14px rgba(198, 137, 13, 0.28);
      display: grid;
      place-items: center;
      z-index: 4;
    }

    .coin::before {
      content: "%";
      color: #ffffff;
      font-weight: 800;
      font-size: 0.95rem;
      text-shadow: 0 1px 1px rgba(180, 110, 0, 0.35);
    }

    .coin-top {
      top: -6px;
      right: 44px;
    }

    .coin-bottom {
      right: 84px;
      bottom: 4px;
    }

    .fox-wrapper {
      position: relative;
      margin-top: 48px;
      display: grid;
      place-items: center;
    }

    .shadow {
      position: absolute;
      z-index: 0;
      top: 294px;
      left: 50%;
      width: 212px;
      height: 72px;
      opacity: 0.8;
      transform-origin: center;
      transform: translateX(-50%) scale(1);
      transition: transform 420ms cubic-bezier(0.34, 1.56, 0.64, 1), opacity 300ms ease;
      animation: shadow-pop-in 480ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .shadow.is-small {
      transform: translateX(-50%) scale(0.55);
    }

    .shadow.is-gone {
      opacity: 0;
    }

    .skip-button {
      position: fixed;
      top: 0;
      right: 20px;
      z-index: 20;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 13px;
      background: #ffffff;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.14);
      display: grid;
      place-items: center;
      cursor: pointer;
      touch-action: manipulation;
      opacity: 1;
      transition: opacity 200ms ease;
    }

    .skip-button.is-hidden {
      display: none;
    }

    @keyframes shadow-pop-in {
      from {
        transform: translateX(-50%) scale(0);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) scale(1);
        opacity: 0.8;
      }
    }

    .fox {
      width: 210px;
      max-width: 84%;
      margin-top: 0;
      display: block;
      position: relative;
      z-index: 2;
    }

    .promo {
      position: absolute;
      right: 0;
      bottom: 18px;
      width: 112px;
      max-width: 36%;
      transform: translateX(12%);
      z-index: 3;
    }

    .hero-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      z-index: 2;
      width: 100%;
      padding: 24px 20px 20px;
      background: #ffffff;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      box-shadow: 0 -10px 40px rgba(16, 24, 40, 0.08);
      display: grid;
      gap: 18px;
      text-align: center;
    }

    .hero-footer .headline {
      margin: 0;
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
      font-size: 18px;
      line-height: 1.3;
      min-height: 2.6em;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .hero-footer .description {
      margin: 0 auto;
      max-width: 300px;
      color: var(--text-muted);
      font-family: "Roboto", sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.7;
      min-height: 3.4em;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .hero-footer .headline.is-fading,
    .hero-footer .description.is-fading,
    .retailer-grid.is-fading {
      opacity: 0;
      transform: translateY(10px);
    }

    .hero-footer .actions {
      margin: 0;
    }

    .retailer-grid {
      display: none;
      position: absolute;
      top: 32px;
      bottom: 0;
      left: 24px;
      right: 24px;
      z-index: 1;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: min-content;
      gap: 10px;
      overflow-y: auto;
      padding: 2px 2px 300px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 280ms ease, transform 280ms ease;
    }

    .retailer-grid.is-visible {
      display: grid;
    }

    .retailer-item {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid var(--border);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .retailer-logo {
      position: relative;
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: #ffffff;
      display: grid;
      place-items: center;
      font-family: "DM Sans", sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.02em;
      overflow: hidden;
    }

    .retailer-logo-fallback {
      position: relative;
      z-index: 1;
    }

    .retailer-logo-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 5px;
    }

    .retailer-heart {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: none;
      background: transparent;
      box-shadow: none;
      display: grid;
      place-items: center;
      color: #c7cbd6;
      cursor: pointer;
      padding: 0;
      touch-action: manipulation;
    }

    .retailer-heart svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .retailer-heart.is-active {
      color: #ef4444;
    }

    .content {
      display: none;
    }

    .headline {
      margin: 0;
      font-size: 1.5rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .description {
      margin: 14px auto 0;
      max-width: 280px;
      color: var(--text-muted);
      font-size: 0.96rem;
      line-height: 1.7;
      font-weight: 500;
    }

    .actions {
      margin: 28px 0 0;
      display: grid;
      gap: 14px;
      text-align: center;
    }

    .button-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 300px;
      min-height: 56px;
      margin: 0 auto;
      text-align: center;
      padding: 16px 18px;
      border-radius: 999px;
      border: none;
      background: var(--button);
      color: #101828;
      font-size: 1rem;
      font-weight: 800;
      box-shadow: 0 14px 28px rgba(254, 209, 48, 0.24);
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .button-primary:active {
      transform: translateY(1px);
      background: var(--button-pressed);
    }

    .button-primary.is-disabled {
      background: #E9EBEC;
      color: #939AA0;
      box-shadow: none;
      cursor: not-allowed;
    }

    .button-primary.is-disabled:active {
      transform: none;
      background: #E9EBEC;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
    }

    .dot {
      width: 10px;
      height: 10px;
      padding: 0;
      border: none;
      border-radius: 999px;
      background: #d9dbe8;
      cursor: pointer;
      touch-action: manipulation;
      position: relative;
    }

    .dot::before {
      content: "";
      position: absolute;
      inset: -10px;
    }

    .dot.active {
      width: 14px;
      background: #fed130;
    }

    .hint {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="status-bar">
    <svg width="17" height="13" viewBox="0 0 17 13" fill="none"><path d="M8.5 11.2c.66 0 1.2.54 1.2 1.2s-.54 1.2-1.2 1.2-1.2-.54-1.2-1.2.54-1.2 1.2-1.2Zm0-3.6c1.4 0 2.68.5 3.68 1.34a.5.5 0 0 1 .04.72l-.9.9a.5.5 0 0 1-.68.02A3.98 3.98 0 0 0 8.5 9.6a3.98 3.98 0 0 0-2.14 1.28.5.5 0 0 1-.68-.02l-.9-.9a.5.5 0 0 1 .04-.72A5.98 5.98 0 0 1 8.5 7.6Zm0-3.6c2.3 0 4.4.85 6.02 2.26a.5.5 0 0 1 .03.73l-.9.9a.5.5 0 0 1-.67.03A7.98 7.98 0 0 0 8.5 5.6c-1.98 0-3.79.7-5.2 1.86a.5.5 0 0 1-.67-.03l-.9-.9a.5.5 0 0 1 .03-.73A9.96 9.96 0 0 1 8.5 4Z" fill="#0f172a"/></svg>
    <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="#0f172a"/><rect x="5" y="5.5" width="3" height="6.5" rx="0.5" fill="#0f172a"/><rect x="10" y="3" width="3" height="9" rx="0.5" fill="#0f172a"/><rect x="15" y="0" width="3" height="12" rx="0.5" fill="#0f172a"/></svg>
    <svg width="25" height="13" viewBox="0 0 25 13" fill="none"><rect x="0.75" y="0.75" width="20.5" height="11.5" rx="2.75" stroke="#0f172a" stroke-opacity="0.4"/><rect x="2" y="2" width="18" height="9" rx="1.5" fill="#0f172a"/><path d="M22.5 4.5v4a1.5 1.5 0 0 0 0-4Z" fill="#0f172a" fill-opacity="0.4"/></svg>
    <time>12:30</time>
  </div>
  <button class="skip-button" id="skipButton" type="button" aria-label="Pomiń">
    <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
      <path d="M4.5 4.5l11 11M15.5 4.5l-11 11" stroke="#20232C" stroke-width="2.2" stroke-linecap="round"/>
    </svg>
  </button>
  <main class="page">
    <section class="screen" id="screen">
      <div class="hero-panel">
        <div class="map-bg" id="mapBg"></div>
        <div class="hero-card" id="heroCard">
          <div class="speech">Hej tu Spryciak! Witaj w Gazetkowie</div>
          <div class="fox-wrapper">
            <img class="fox" src="/img/onboarding/lis-2@150x%201.png" alt="Spryciak" />
            <img class="promo" src="/img/onboarding/leaflet.png" alt="Promo card" />
            <span class="coin coin-top"></span>
            <span class="coin coin-bottom"></span>
          </div>
        </div>
        <svg class="shadow" id="shadowSvg" width="212" height="72" viewBox="0 0 212 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="106" cy="36" rx="106" ry="36" fill="#D7E9FF"/>
        </svg>
        <div class="speech is-hidden" id="speech2">Znajdę promocje blisko Ciebie</div>
        <div class="retailer-grid" id="retailerGrid"></div>
      </div>
      <div class="hero-footer">
        <h1 class="headline" id="headline">Gazetki, okazje i zniżki — wszystko w jednym miejscu.</h1>
        <p class="description" id="description">Natychmiast znajdź zniżki w sklepach w twojej okolicy. Nigdy nie przegapisz okazji.</p>
        <div class="actions">
          <button class="button-primary" id="nextButton" type="button">Dalej</button>
        </div>
        <div class="pagination" id="pagination">
          <button class="dot active" type="button" data-screen="0" aria-label="Krok 1"></button>
          <button class="dot" type="button" data-screen="1" aria-label="Krok 2"></button>
          <button class="dot" type="button" data-screen="2" aria-label="Krok 3"></button>
        </div>
      </div>
    </section>
  </main>
  <script>
    const onboardingScreens = [
      {
        headline: "Gazetki, okazje i zniżki — wszystko w jednym miejscu.",
        description: "Natychmiast znajdź zniżki w sklepach w twojej okolicy. Nigdy nie przegapisz okazji.",
      },
      {
        headline: "Oferty i promocje dostępne w Twojej okolicy",
        description: "Udostępnij lokalizację, aby zobaczyć gazetki i lokalne oferty sklepów w swojej okolicy.",
      },
      {
        headline: "Wybierz sklepy w których najchętniej robisz zakupu",
        description: "My poinformujemy Cię o nowych gazetkach",
      },
    ];

    const retailerColors = ["#e63946", "#1d4ed8", "#f59e0b", "#059669", "#7c3aed", "#db2777", "#0891b2", "#ea580c"];

    const retailers = [
      "Biedronka", "Lidl", "Kaufland", "Auchan", "Netto", "Carrefour", "Aldi", "Dino",
      "Stokrotka", "Żabka", "POLOmarket", "Delikatesy Centrum", "E.Leclerc", "Intermarché", "Społem",
      "Piotr i Paweł", "Selgros", "Makro", "Rossmann", "Super-Pharm", "Pepco", "Action", "Jysk",
      "Media Markt", "Media Expert", "RTV Euro AGD", "Castorama", "Leroy Merlin", "OBI", "Empik", "CCC",
      "Deichmann", "KiK", "Sinsay", "Reserved", "House", "Mohito", "Cropp", "Home&You",
      "Agata Meble", "Black Red White", "IKEA", "Neonet", "Komputronik", "X-Kom", "Decathlon", "Go Sport",
    ];

    function initials(name) {
      return name
        .split(/[\s&.]+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((word) => word[0])
        .join("")
        .toUpperCase();
    }

    const retailerLogoFiles = {
      "Biedronka": "biedronka.png",
      "Lidl": "lidl.png",
      "Kaufland": "kaufland.png",
      "Auchan": "auchan.png",
      "Netto": "netto.jpg",
      "Carrefour": "carrefour.jpg",
      "Aldi": "aldi.png",
      "Dino": "dino.png",
      "Stokrotka": "Stokrotka.png",
      "Żabka": "zabka.webp",
      "POLOmarket": "Polomarket.png",
      "Intermarché": "intermarche.png",
      "Społem": "spolem.png",
      "Piotr i Paweł": "piotr_i_pawel.png",
      "Selgros": "Selgros.png",
      "E.Leclerc": "E.Leclerc.webp",
      "Delikatesy Centrum": "delikatesy_centrum.png",
    };

    const retailerGrid = document.getElementById("retailerGrid");

    retailers.forEach((name, index) => {
      const item = document.createElement("div");
      item.className = "retailer-item";
      const logoFile = retailerLogoFiles[name];
      const logoImg = logoFile
        ? `<img
            class="retailer-logo-img"
            src="/onboarding/Logo/${logoFile}"
            alt="${name}"
            loading="lazy"
            onerror="this.remove()"
            onload="this.previousElementSibling.style.display='none'"
          />`
        : "";
      item.innerHTML = `
        <button class="retailer-heart" type="button" aria-label="Obserwuj ${name}" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10.2-9.3C0.1 8.7 1.4 5 5 4.1c2.1-0.5 4.1 0.4 5.3 2.1a1 1 0 0 0 1.6 0c1.2-1.7 3.2-2.6 5.3-2.1 3.6 0.9 4.9 4.6 3.2 7.6C19.5 16.4 12 21 12 21z"/></svg>
        </button>
        <div class="retailer-logo" style="color:${retailerColors[index % retailerColors.length]}">
          <span class="retailer-logo-fallback">${initials(name)}</span>
          ${logoImg}
        </div>
      `;
      retailerGrid.appendChild(item);
    });

    let selectedRetailerCount = 0;

    retailerGrid.addEventListener("click", (event) => {
      const item = event.target.closest(".retailer-item");
      if (!item) return;
      const heart = item.querySelector(".retailer-heart");
      const isActive = heart.classList.toggle("is-active");
      heart.setAttribute("aria-pressed", String(isActive));
      selectedRetailerCount += isActive ? 1 : -1;
      updateNextButtonState();
    });

    const pageEl = document.querySelector(".page");

    function fitPageToViewport() {
      pageEl.style.transform = "scale(1)";
      const rect = pageEl.getBoundingClientRect();
      const scale = window.innerWidth / rect.width;
      pageEl.style.transform = `scale(${scale})`;
    }

    fitPageToViewport();
    window.addEventListener("resize", fitPageToViewport);
    window.addEventListener("orientationchange", fitPageToViewport);

    const statusBarEl = document.querySelector(".status-bar");
    const skipButtonEl = document.getElementById("skipButton");

    function positionSkipButton() {
      skipButtonEl.style.top = `${statusBarEl.getBoundingClientRect().height + 24}px`;
    }

    function positionOverlays() {
      positionSkipButton();
    }

    positionOverlays();
    window.addEventListener("resize", positionOverlays);
    window.addEventListener("orientationchange", positionOverlays);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(positionOverlays);
    }

    let currentScreen = 0;
    const headlineEl = document.getElementById("headline");
    const descriptionEl = document.getElementById("description");
    const nextButton = document.getElementById("nextButton");
    const dots = document.querySelectorAll("#pagination .dot");
    const heroCard = document.getElementById("heroCard");
    const shadowSvg = document.getElementById("shadowSvg");
    const skipButton = document.getElementById("skipButton");
    const speech2 = document.getElementById("speech2");
    const mapBg = document.getElementById("mapBg");

    function updateNextButtonState() {
      const needsRetailer = currentScreen === 2 && selectedRetailerCount === 0;
      nextButton.disabled = needsRetailer;
      nextButton.classList.toggle("is-disabled", needsRetailer);
      nextButton.textContent = needsRetailer ? "Wybierz co najmniej 1 sklep" : "Dalej";
    }

    function goToScreen(index) {
      if (index < 0 || index >= onboardingScreens.length || index === currentScreen) return;
      currentScreen = index;
      const screen = onboardingScreens[currentScreen];

      headlineEl.classList.add("is-fading");
      descriptionEl.classList.add("is-fading");
      retailerGrid.classList.add("is-fading");
      heroCard.classList.add("is-fading");

      window.setTimeout(() => {
        headlineEl.textContent = screen.headline;
        descriptionEl.textContent = screen.description;
        updateNextButtonState();
        retailerGrid.classList.toggle("is-visible", currentScreen === 2);
        heroCard.classList.toggle("is-hidden", currentScreen !== 0);
        mapBg.classList.toggle("is-visible", currentScreen === 1);
        shadowSvg.classList.toggle("is-small", currentScreen === 1);
        shadowSvg.classList.toggle("is-gone", currentScreen === 2);
        speech2.classList.toggle("is-hidden", currentScreen !== 1);
        skipButton.classList.toggle("is-hidden", currentScreen === 2);
        headlineEl.classList.remove("is-fading");
        descriptionEl.classList.remove("is-fading");
        retailerGrid.classList.remove("is-fading");
        heroCard.classList.remove("is-fading");
      }, 240);

      dots.forEach((dot, dotIndex) => dot.classList.toggle("active", dotIndex === currentScreen));
    }

    nextButton.addEventListener("click", () => {
      goToScreen(currentScreen + 1);
    });

    skipButton.addEventListener("click", () => {
      goToScreen(onboardingScreens.length - 1);
    });

    dots.forEach((dot) => {
      dot.addEventListener("click", () => {
        goToScreen(Number(dot.dataset.screen));
      });
    });
  </script>
</body>
</html>
